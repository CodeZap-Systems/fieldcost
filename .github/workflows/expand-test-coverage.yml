name: Feature Test Coverage Template

on:
  workflow_dispatch:
    inputs:
      feature-name:
        description: 'Name of the feature being tested'
        required: true
        type: string
      test-type:
        description: 'Type of test to create'
        required: true
        type: choice
        options:
          - crud-operations
          - security-check
          - performance-benchmark
          - integration-test

jobs:
  generate-test-template:
    name: Generate Test Template for New Feature
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test template file
        run: |
          FEATURE_NAME="${{ github.event.inputs.feature-name }}"
          TEST_TYPE="${{ github.event.inputs.test-type }}"
          FILENAME="test-${FEATURE_NAME}-${TEST_TYPE}.mjs"
          
          cat > "$FILENAME" << 'TEMPLATE'
          #!/usr/bin/env node
          /**
           * Test: {{FEATURE_NAME}} - {{TEST_TYPE}}
           * Purpose: Comprehensive testing for {{FEATURE_NAME}}
           * Run: node {{FILENAME}}
           * CI: Automatically runs on: push, PR, nightly
           */

          import https from 'https';
          import { URL } from 'url';

          const BASE_URL = 'https://fieldcost.vercel.app/api';
          const TEST_USER = 'demo';
          
          let results = {
            total: 0,
            passed: 0,
            failed: 0,
            tests: []
          };

          // ============================================================================
          // HTTP REQUEST UTILITY
          // ============================================================================

          function httpRequest(method, path, body = null) {
            return new Promise((resolve, reject) => {
              const url = new URL(path, BASE_URL);
              const options = {
                hostname: url.hostname,
                port: 443,
                path: url.pathname + url.search,
                method,
                headers: { 'Content-Type': 'application/json' },
                timeout: 15000,
              };

              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', (chunk) => (data += chunk));
                res.on('end', () => {
                  try {
                    resolve({ status: res.statusCode, body: data ? JSON.parse(data) : null });
                  } catch {
                    resolve({ status: res.statusCode, body: data });
                  }
                });
              });

              req.on('error', reject);
              req.on('timeout', () => {
                req.destroy();
                reject(new Error('Timeout'));
              });

              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          }

          // ============================================================================
          // TEST UTILITIES
          // ============================================================================

          function test(name, condition, details = {}) {
            results.total++;
            if (condition) {
              results.passed++;
              console.log(`  ✅ ${name}`);
            } else {
              results.failed++;
              console.log(`  ❌ ${name}`);
              if (details.error) console.log(`     Error: ${details.error}`);
            }
            results.tests.push({ name, passed: condition, details });
          }

          // ============================================================================
          // FEATURE TESTS - TODO: CUSTOMIZE FOR YOUR FEATURE
          // ============================================================================

          async function testFeatureCreation() {
            console.log('\n' + '='.repeat(70));
            console.log('📝 {{FEATURE_NAME}} - Create Operation');
            console.log('='.repeat(70) + '\n');

            // TODO: Replace with your feature creation test
            try {
              const res = await httpRequest('POST', 'projects', {
                name: `Feature Test {{FEATURE_NAME}} ${Date.now()}`,
                user_id: TEST_USER,
              });
              test('Feature creation succeeds', res.status === 200 || res.status === 201, { status: res.status });
            } catch (err) {
              test('Feature creation', false, { error: err.message });
            }
          }

          async function testFeatureRetrieval() {
            console.log('\n' + '='.repeat(70));
            console.log('📖 {{FEATURE_NAME}} - Read Operation');
            console.log('='.repeat(70) + '\n');

            // TODO: Replace with your feature retrieval test
            try {
              const res = await httpRequest('GET', `projects?user_id=${TEST_USER}`);
              test('Feature retrieval succeeds', res.status === 200 && Array.isArray(res.body), { status: res.status });
            } catch (err) {
              test('Feature retrieval', false, { error: err.message });
            }
          }

          async function testFeatureUpdate() {
            console.log('\n' + '='.repeat(70));
            console.log('✏️ {{FEATURE_NAME}} - Update Operation');
            console.log('='.repeat(70) + '\n');

            // TODO: Replace with your feature update test
            test('Feature update placeholder', true, {});
          }

          async function testFeatureValidation() {
            console.log('\n' + '='.repeat(70));
            console.log('🔍 {{FEATURE_NAME}} - Validation & Edge Cases');
            console.log('='.repeat(70) + '\n');

            // TODO: Add validation tests specific to your feature
            try {
              const res = await httpRequest('POST', 'projects', {
                name: '', // Empty name - should fail
                user_id: TEST_USER,
              });
              test('Empty input rejected', res.status === 400 || res.status === 200, { status: res.status });
            } catch (err) {
              test('Validation test', false, { error: err.message });
            }
          }

          // ============================================================================
          // MAIN TEST RUNNER
          // ============================================================================

          async function runAllTests() {
            console.log('\n╔' + '═'.repeat(68) + '╗');
            console.log('║' + ' '.repeat(15) + '🧪 {{FEATURE_NAME}} TEST SUITE{{TEST_TYPE}}' + ' '.repeat(10) + '║');
            console.log('╚' + '═'.repeat(68) + '╝\n');

            try {
              await testFeatureCreation();
              await testFeatureRetrieval();
              await testFeatureUpdate();
              await testFeatureValidation();
            } catch (err) {
              console.error('Test error:', err);
            }

            // Print summary
            console.log('\n' + '═'.repeat(70));
            console.log('📊 TEST SUMMARY');
            console.log('═'.repeat(70));
            console.log(`Total Tests: ${results.total}`);
            console.log(`✅ Passed: ${results.passed}`);
            console.log(`❌ Failed: ${results.failed}`);
            console.log(`Pass Rate: ${Math.round((results.passed / results.total) * 100)}%`);
            console.log('═'.repeat(70) + '\n');

            process.exit(results.failed === 0 ? 0 : 1);
          }

          runAllTests().catch(console.error);
          TEMPLATE
          
          echo "Generated: $FILENAME"
          cat "$FILENAME"

      - name: Create feature branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          FEATURE_NAME="${{ github.event.inputs.feature-name }}"
          git checkout -b feature/$FEATURE_NAME || git checkout feature/$FEATURE_NAME
          git add test-$FEATURE_NAME-*.mjs
          git commit -m "test: add {{TEST_TYPE}} tests for {{FEATURE_NAME}}" || true
          git push origin feature/$FEATURE_NAME

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const featureName = '${{ github.event.inputs.feature-name }}';
            const testType = '${{ github.event.inputs.test-type }}';
            
            github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `test: add ${testType} tests for ${featureName}`,
              body: `## Test Coverage for ${featureName}

This PR adds automated tests for the new ${featureName} feature.

### Test Type
- ${testType}

### To Complete This Test
1. Open \`test-${featureName}-${testType}.mjs\`
2. Uncomment and customize the test functions for your feature
3. Replace placeholder API endpoints with actual endpoints
4. Run tests locally: \`node test-${featureName}-${testType}.mjs\`
5. Verify all tests pass before merging

### Test Checklist
- [ ] Create/Read/Update/Delete operations tested
- [ ] Input validation tested
- [ ] Error handling tested
- [ ] Security implications considered
- [ ] Performance impact assessed

### CI/CD Integration
Tests will automatically run:
- On every push/PR to verify functionality
- Nightly as part of security/performance baseline
- Pre-deployment to gate production releases
              `,
              head: \`feature/$\{featureName\}\`,
              base: 'develop'
            });

      - name: Post test template guide
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: \`## 🧪 Test Template Generated

Test file created: \`test-${{ github.event.inputs.feature-name }}-${{ github.event.inputs.test-type }}.mjs\`

### Next Steps:
1. Customize the test functions for your feature
2. Replace \`projects\` endpoint with your feature endpoint
3. Add feature-specific test cases
4. Run locally to verify tests pass
5. Push changes to trigger CI/CD

### Test Structure:
- **testFeatureCreation()** - POST operations
- **testFeatureRetrieval()** - GET operations  
- **testFeatureUpdate()** - PUT/PATCH operations
- **testFeatureValidation()** - Edge cases & validation

### Running Tests:
\`\`\`bash
node test-${{ github.event.inputs.feature-name }}-${{ github.event.inputs.test-type }}.mjs
\`\`\`

Tests will be automatically included in:
- ✅ Push/PR validation
- ✅ Nightly security checks
- ✅ Pre-deployment gate
              \`
            });
