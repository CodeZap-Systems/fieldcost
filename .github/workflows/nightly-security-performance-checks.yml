name: Nightly Security & Performance Checks

on:
  schedule:
    # Run every night at 2 AM UTC (10 PM EST / 7 PM PST)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  NODE_VERSION: '18'
  ALERT_EMAIL: 'devops@fieldcost.com'

jobs:
  security-check:
    name: Nightly Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run comprehensive security tests
        id: security-tests
        run: |
          echo "::group::🔐 Security Tests"
          node test-security.mjs 2>&1 | tee security-report.txt
          echo "::endgroup::"
        continue-on-error: true

      - name: Check for vulnerabilities in dependencies
        id: npm-audit
        run: |
          echo "::group::📦 Dependency Audit"
          npm audit --audit-level=moderate 2>&1 | tee npm-audit-report.txt || true
          echo "::endgroup::"
        continue-on-error: true

      - name: Generate security report
        if: always()
        run: |
          cat > security-report-summary.md << 'EOF'
          # 🔐 Nightly Security Report
          
          **Date:** $(date -u)
          **Environment:** Production
          **Target:** https://fieldcost.vercel.app
          
          ## Test Results
          
          EOF
          
          cat security-report.txt >> security-report-summary.md
          echo "" >> security-report-summary.md
          
          cat >> security-report-summary.md << 'EOF'
          
          ## Dependency Audit
          
          EOF
          
          cat npm-audit-report.txt >> security-report-summary.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_number }}
          path: |
            security-report-summary.md
            security-report.txt
            npm-audit-report.txt
          retention-days: 90

      - name: Create security report issue
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report-summary.md', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔐 Nightly Security Check - Failed (${new Date().toISOString().split('T')[0]})`,
              body: report,
              labels: ['security', 'automated', 'nightly-check']
            });

  performance-check:
    name: Nightly Performance Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        id: performance-tests
        run: |
          echo "::group::⚡ Performance Tests"
          node test-performance.mjs 2>&1 | tee performance-report.txt
          echo "::endgroup::"
        continue-on-error: true

      - name: Parse performance metrics
        run: |
          cat > performance-summary.md << 'EOF'
          # ⚡ Nightly Performance Report
          
          **Date:** $(date -u)
          **Environment:** Production
          **Target:** https://fieldcost.vercel.app
          
          ## Performance Baseline
          
          EOF
          
          cat performance-report.txt >> performance-summary.md

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports-${{ github.run_number }}
          path: |
            performance-summary.md
            performance-report.txt
          retention-days: 90

      - name: Compare with baseline
        continue-on-error: true
        run: |
          echo "Performance metrics collected."
          echo "TODO: Compare with historical baseline and alert if degradation > 10%"

  summary:
    name: Send Summary Notification
    runs-on: ubuntu-latest
    needs: [security-check, performance-check]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Security Check: ${{ needs.security-check.result }}"
          echo "Performance Check: ${{ needs.performance-check.result }}"

      - name: Send success notification
        if: needs.security-check.result == 'success' && needs.performance-check.result == 'success'
        run: |
          echo "✅ All nightly checks passed!"
          echo "Reports available in GitHub Actions artifacts"

      - name: Send failure notification
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Nightly Checks Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `Nightly security and performance checks failed.\n\nDetails: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['automated', 'nightly-check', 'alert']
            });

      - name: Slack notification (if configured)
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🌙 Nightly Tests: ${{ needs.security-check.result }} / ${{ needs.performance-check.result }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Nightly Security & Performance Checks*\n*Security:* ${{ needs.security-check.result }}\n*Performance:* ${{ needs.performance-check.result }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Report"
                      },
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
