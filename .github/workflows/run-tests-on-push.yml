name: Run Tests on Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        continue-on-error: false

      - name: Build application
        run: npm run build
        continue-on-error: false

      - name: Run Core API Tests
        id: core-tests
        run: |
          echo "::group::Core API Tests"
          node comprehensive-automated-tests.mjs 2>&1 | tee core-test-results.txt
          echo "::endgroup::"
        continue-on-error: true

      - name: Run Security Tests
        id: security-tests
        run: |
          echo "::group::Security Tests"
          node test-security.mjs 2>&1 | tee security-test-results.txt
          echo "::endgroup::"
        continue-on-error: true

      - name: Run Database Schema Tests
        id: schema-tests
        run: |
          echo "::group::Database Schema Tests"
          node test-database-schema.mjs 2>&1 | tee schema-test-results.txt
          echo "::endgroup::"
        continue-on-error: true

      - name: Run Data Validation Tests
        id: validation-tests
        run: |
          echo "::group::Data Validation Tests"
          node test-data-validation.mjs 2>&1 | tee validation-test-results.txt
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            core-test-results.txt
            security-test-results.txt
            schema-test-results.txt
            validation-test-results.txt
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const coreResults = fs.existsSync('core-test-results.txt') ? fs.readFileSync('core-test-results.txt', 'utf8') : 'No results';
            const securityResults = fs.existsSync('security-test-results.txt') ? fs.readFileSync('security-test-results.txt', 'utf8') : 'No results';
            
            const comment = `## 🧪 Automated Test Results

            <details>
            <summary>Core API Tests</summary>

            \`\`\`
            ${coreResults.split('\n').slice(-20).join('\n')}
            \`\`\`
            </details>

            <details>
            <summary>Security Tests</summary>

            \`\`\`
            ${securityResults.split('\n').slice(-20).join('\n')}
            \`\`\`
            </details>

            ✅ Tests completed. Check artifacts for full results.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Check test status
        run: |
          echo "Core Tests: ${{ steps.core-tests.outcome }}"
          echo "Security Tests: ${{ steps.security-tests.outcome }}"
          
          if [ "${{ steps.core-tests.outcome }}" = "failure" ] || [ "${{ steps.security-tests.outcome }}" = "failure" ]; then
            echo "❌ Tests failed. Check logs above."
            exit 1
          else
            echo "✅ Tests passed successfully!"
          fi

  status-check:
    name: Test Status Check
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Update check run
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const testStatus = '${{ needs.test.result }}';
            const status = testStatus === 'success' ? 'completed' : 'completed';
            const conclusion = testStatus === 'success' ? 'success' : 'failure';
            
            console.log(`Test job status: ${testStatus}`);
            console.log(`Check run conclusion: ${conclusion}`);

      - name: Print summary
        run: |
          echo "## ✅ Test Workflow Complete"
          echo "Status: ${{ needs.test.result }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
