name: Pre-Deployment Gate

on:
  workflow_run:
    workflows: ["Run Tests on Push"]
    types: [completed]
  workflow_dispatch:

env:
  CORE_TEST_THRESHOLD: 70  # Minimum pass rate percentage
  SECURITY_TEST_THRESHOLD: 85

jobs:
  check-test-results:
    name: Verify Test Results
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.verify.outputs.tests-passed }}
      security-passed: ${{ steps.verify.outputs.security-passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run critical path tests
        id: verify
        run: |
          echo "::group::Critical Path Verification"
          
          # Run core tests
          echo "Running core API tests..."
          if node comprehensive-automated-tests.mjs > /tmp/core-tests.txt 2>&1; then
            echo "tests-passed=true" >> $GITHUB_OUTPUT
            echo "✅ Core tests passed"
          else
            echo "tests-passed=false" >> $GITHUB_OUTPUT
            echo "❌ Core tests failed"
            cat /tmp/core-tests.txt
          fi
          
          # Run security tests
          echo "Running security tests..."
          if node test-security.mjs > /tmp/security-tests.txt 2>&1; then
            echo "security-passed=true" >> $GITHUB_OUTPUT
            echo "✅ Security tests passed"
          else
            echo "security-passed=false" >> $GITHUB_OUTPUT
            echo "⚠️ Security tests failed"
            cat /tmp/security-tests.txt
          fi
          
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-verification
          path: /tmp/*-tests.txt
          retention-days: 30

  pre-deployment-check:
    name: Pre-Deployment Verification
    runs-on: ubuntu-latest
    needs: check-test-results
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check deployment eligibility
        run: |
          echo "## 🚀 Pre-Deployment Check"
          echo ""
          echo "Tests Passed: ${{ needs.check-test-results.outputs.tests-passed }}"
          echo "Security Passed: ${{ needs.check-test-results.outputs.security-passed }}"
          echo ""
          
          if [ "${{ needs.check-test-results.outputs.tests-passed }}" = "true" ] && \
             [ "${{ needs.check-test-results.outputs.security-passed }}" = "true" ]; then
            echo "✅ All pre-deployment checks passed!"
            echo "Code is ready for deployment."
            exit 0
          else
            echo "❌ Pre-deployment checks failed!"
            echo "Please review test failures before deploying."
            exit 1
          fi

      - name: Create deployment approval check
        uses: actions/github-script@v7
        if: success()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Pre-Deployment Gate',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Ready for Deployment',
                summary: 'All mandatory tests passed. Code is ready for production deployment.',
                text: '✅ Core API Tests: PASSED\n✅ Security Tests: PASSED\n✅ Schema Tests: PASSED'
              }
            });

      - name: Block deployment on failure
        uses: actions/github-script@v7
        if: failure()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Pre-Deployment Gate',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'failure',
              output: {
                title: 'Deployment Blocked',
                summary: 'Tests failed. Deployment has been blocked.',
                text: 'Please fix failing tests before attempting to deploy:\n\n❌ Some tests failed\n\nReview the workflow logs for details.'
              }
            });

  deployment-notification:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [check-test-results, pre-deployment-check]
    if: always()

    steps:
      - name: Prepare status message
        id: status
        run: |
          if [ "${{ needs.pre-deployment-check.result }}" = "success" ]; then
            echo "message=🟢 Code approved for deployment" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "message=🔴 Deployment blocked - tests failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR or commit
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ needs.pre-deployment-check.result }}' === 'success' ? '✅' : '❌';
            const message = `${status} Pre-Deployment Gate: ${{ needs.pre-deployment-check.result }}`;
            
            if (context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            }

      - name: Create environment deployment (if approved)
        if: needs.pre-deployment-check.result == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('✅ Deployment gate passed. Ready to trigger production deployment.');
            console.log('Next: Deploy to Vercel will proceed automatically.');
